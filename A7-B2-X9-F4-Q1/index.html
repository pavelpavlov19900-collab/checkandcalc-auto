<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    
    <title>The Seraphim Vault | Access Granted</title>
    
    <style>
        body {
            background-color: #050505;
            color: #d4af37; /* Старо злато */
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            padding-top: 10vh;
            margin: 0;
            overflow: hidden;
        }
        .terminal {
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid #333;
            padding: 40px;
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
        }
        h1 {
            font-size: 2em;
            letter-spacing: 5px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }
        p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #aaa;
        }
        .highlight {
            color: #d4af37;
            font-weight: bold;
        }
        .download-btn {
            display: inline-block;
            padding: 15px 30px;
            color: #050505;
            background-color: #d4af37;
            text-decoration: none;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background-color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="terminal">
        <h1>Access Granted</h1>
        <p>Welcome, Seeker. You have deciphered the frequencies and found the hidden path.</p>
        <p>The <span class="highlight">Seraphim Vault</span> recognizes your dedication. As promised, your reward awaits below.</p>
        
        <a href="#" class="download-btn">Download Secret Master Track</a>
        
        <p style="margin-top: 40px; font-size: 0.8em; color: #555;">The Watcher in the Arch smiles upon you.</p>
    </div>

</body>
</html>
