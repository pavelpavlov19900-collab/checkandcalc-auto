name: Auto AI Blogger
on:
  schedule:
    - cron: '0 13 * * *'  # Всеки ден в 13:00 UTC
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install google-genai tweepy  # Тук добавихме tweepy

      - name: Run SEO Machine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py  # Твоят работещ скрипт за статии

      - name: Post to X (Twitter)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python post_to_x.py  # Новият скрипт за Twitter

      - name: Save to GitHub
        run: |
          git config --global user.name 'AI Factory'
          git config --global user.email 'factory@checkandcalc.com'
          git add .
          git commit -m "New High-Value SEO Article and Social Post" || exit 0
          git push
