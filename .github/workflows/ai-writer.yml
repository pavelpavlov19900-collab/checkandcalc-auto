name: Auto AI Blogger
on:
  schedule:
    - cron: '0 13 * * *'  # Всеки ден в 13:00 UTC (15:00/16:00 бг време)
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install Google AI
        run: pip install google-genai
      - name: Run SEO Machine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py
      - name: Save to Netlify
        run: |
          git config --global user.name 'AI Factory'
          git config --global user.email 'factory@checkandcalc.com'
          git add .
          git commit -m "New High-Value SEO Article" || exit 0
          git push
