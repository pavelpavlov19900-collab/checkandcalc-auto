name: Auto AI Blogger
on:
  schedule:
    - cron: '12 13 * * *'  # Всеки ден в 13:12 UTC (16:12 БГ време)
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install --upgrade google-genai requests

      - name: Run SEO Machine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }} # <--- ДОБАВИ ТОВА
        run: python generate.py

      - name: Post to Telegram
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python post_to_telegram.py  # Новият скрипт за Телеграм

      - name: Save to GitHub
        run: |
          git config --global user.name 'AI Factory'
          git config --global user.email 'factory@checkandcalc.com'
          git add posts_database.json *.html *.png  # <--- ТУК Е КЛЮЧЪТ
          git commit -m "New SEO Article, Image and Telegram Post" || exit 0
          git push
