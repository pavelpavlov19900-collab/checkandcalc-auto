name: LinkedIn Auto Post

on:
  schedule:
    - cron: '13 13 * * *' # Всеки ден в 13:13 UTC (Оптимално за ЕС и САЩ)
  workflow_dispatch: # Позволява ръчно пускане за тест

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Важно: За да може роботът да запише, че е публикувал!
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Използваме най-новата версия на checkout

      - name: Set up Python
        uses: actions/setup-python@v5 # Използваме най-новата версия на setup-python
        with:
          python-version: '3.x' # Използваме най-новата стабилна версия на Python 3

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: Run automation
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
        run: python auto_post_linkedin.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posts_database.json
          git commit -m "Update post status [skip ci]" || echo "No changes to commit"
          git push
